<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F5F0E8">
  <title>Learn Korean - Hangul</title>
  <link rel="stylesheet" href="css/base.css">
  <style>
    .quiz {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      padding: 1rem 1.25rem;
      background: var(--bg);
    }

    .quiz__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 0.5rem;
    }

    .quiz__progress {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .quiz__score {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--gold);
      white-space: nowrap;
    }

    .quiz__prompt {
      text-align: center;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem 1rem;
      margin-bottom: 1rem;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .quiz__char {
      font-size: 72px;
      line-height: 1;
      font-weight: 700;
      color: var(--text-primary);
    }

    .quiz__meaning {
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.35;
      padding: 0 0.5rem;
    }

    .quiz__listen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .quiz__listen-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .quiz__listen-btn:hover {
      border-color: var(--gold);
    }

    .quiz__listen-text {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .quiz__options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .option-btn {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.05rem;
      text-align: center;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--gold);
    }

    .option-btn:disabled {
      cursor: default;
    }

    .option-btn--correct {
      background: var(--correct-bg);
      color: var(--correct-text);
      border-color: var(--correct-bg);
    }

    .option-btn--wrong {
      background: var(--wrong-bg);
      color: var(--wrong-text);
      border-color: var(--wrong-bg);
    }

    .quiz__feedback {
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      line-height: 1.4;
      display: none;
    }

    .quiz__feedback.is-visible {
      display: block;
    }

    .quiz__feedback--correct {
      background: var(--correct-bg);
      color: var(--correct-text);
    }

    .quiz__feedback--wrong {
      background: var(--wrong-bg);
      color: var(--wrong-text);
    }
  </style>
</head>
<body>
  <div class="quiz">
    <header class="quiz__header">
      <span class="quiz__progress" id="progress-label">1 / 10</span>
      <span class="quiz__score" id="score-label">0 pts</span>
    </header>

    <div class="quiz__prompt" id="prompt-area">
      <span class="quiz__char" id="prompt-char">?</span>
    </div>

    <div class="quiz__options" id="options" role="group" aria-label="Answer choices"></div>
    <div class="quiz__feedback" id="feedback" role="status"></div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/hangul-data.js"></script>
  <script src="js/tts.js"></script>
  <script>
    (async function () {
      const TOTAL = 10;

      const stageId = Number(App.getParam('stage', '1'));
      const stage = HangulData.getStage(stageId);
      const pool = stage.items;
      const isWordStage = stage.type === 'word';

      let qIndex = 0;
      let score = 0;
      let streak = 0;
      let bestStreak = 0;
      let correctCount = 0;
      let answered = false;

      const questions = buildQuestions(pool, TOTAL);

      const progressLabel = document.getElementById('progress-label');
      const scoreLabel = document.getElementById('score-label');
      const promptArea = document.getElementById('prompt-area');
      const optionsEl = document.getElementById('options');
      const feedbackEl = document.getElementById('feedback');

      function buildQuestions(items, count) {
        const shuffled = App.shuffle([...items]);
        const list = [];
        for (let i = 0; i < count; i++) {
          list.push({
            item: shuffled[i % shuffled.length],
            type: null,
          });
        }
        return list;
      }

      function pickType(item) {
        const types = ['A', 'B'];
        if (isWordStage && item.meaning) types.push('C');
        return types[Math.floor(Math.random() * types.length)];
      }

      function getPronunciation(item) {
        if (item.sound) return item.sound;
        if (item.meaning) return `${item.roman} \u00B7 ${item.meaning}`;
        return item.roman || item.char;
      }

      function updateScoreLabel() {
        scoreLabel.textContent = `${score} pts`;
      }

      function getOptions(correct, type) {
        const others = pool.filter((x) => x.id !== correct.id);
        const shuffled = App.shuffle(others);
        const picks = [correct, ...shuffled.slice(0, 3)];
        return App.shuffle(picks).map((opt) => ({
          item: opt,
          label:
            type === 'A'
              ? opt.roman
              : opt.char,
          value: type === 'A' ? opt.roman : opt.char,
        }));
      }

      function calcPoints(currentStreak) {
        let pts = 100;
        if (currentStreak >= 3) pts += 50;
        else if (currentStreak === 2) pts += 20;
        return pts;
      }

      function showQuestion() {
        answered = false;
        feedbackEl.classList.remove('is-visible', 'quiz__feedback--correct', 'quiz__feedback--wrong');
        feedbackEl.textContent = '';

        if (qIndex >= TOTAL) {
          finishQuiz();
          return;
        }

        const q = questions[qIndex];
        const item = q.item;
        q.type = pickType(item);

        progressLabel.textContent = `${qIndex + 1} / ${TOTAL}`;
        updateScoreLabel();

        promptArea.innerHTML = '';
        optionsEl.innerHTML = '';

        if (q.type === 'A') {
          promptArea.innerHTML = `<span class="quiz__char">${item.char}</span>`;
        } else if (q.type === 'B') {
          promptArea.innerHTML = `
            <div class="quiz__listen">
              <button type="button" class="quiz__listen-btn" id="btn-play-sound" aria-label="Play sound">&#128266;</button>
              <p class="quiz__listen-text">Which letter makes this sound?</p>
            </div>`;
          setTimeout(() => TTS.speakItem(item), 200);
          document.getElementById('btn-play-sound')?.addEventListener('click', () => {
            TTS.speakItem(item);
          });
        } else {
          promptArea.innerHTML = `<p class="quiz__meaning">${item.meaning}</p>`;
        }

        const options = getOptions(item, q.type);
        const correctValue = q.type === 'A' ? item.roman : item.char;

        options.forEach((opt) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'option-btn';
          btn.textContent = opt.label;
          btn.dataset.value = opt.value;
          btn.addEventListener('click', () => onAnswer(btn, opt.value, correctValue, item, q.type));
          optionsEl.appendChild(btn);
        });
      }

      function onAnswer(btn, selectedValue, correctValue, item, type) {
        if (answered) return;
        answered = true;

        const isCorrect = selectedValue === correctValue;

        optionsEl.querySelectorAll('.option-btn').forEach((b) => {
          b.disabled = true;
          if (b.dataset.value === correctValue) b.classList.add('option-btn--correct');
        });

        if (isCorrect) {
          btn.classList.add('option-btn--correct');
          streak += 1;
          correctCount += 1;
          bestStreak = Math.max(bestStreak, streak);
          score += calcPoints(streak);
          feedbackEl.className = 'quiz__feedback is-visible quiz__feedback--correct';
          feedbackEl.textContent = `\u2713 Correct! ${getPronunciation(item)}`;
          updateScoreLabel();
        } else {
          btn.classList.add('option-btn--wrong');
          streak = 0;
          feedbackEl.className = 'quiz__feedback is-visible quiz__feedback--wrong';
          const answerLabel = type === 'A' ? item.roman : item.char;
          feedbackEl.textContent = `\u2717 Wrong. Answer: ${answerLabel} \u2014 ${getPronunciation(item)}`;
        }

        setTimeout(() => {
          qIndex += 1;
          showQuestion();
        }, 1400);
      }

      function finishQuiz() {
        navigate('result.html', {
          stage: stageId,
          score,
          correct: correctCount,
          streak: bestStreak,
        });
      }

      await TTS.init();
      updateScoreLabel();
      showQuestion();
    })();
  </script>
</body>
</html>
