<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F5F0E8">
  <title>Learn Korean - Hangul</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .settings-section {
      margin-bottom: 1.5rem;
    }

    .settings-section__title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      padding: 0 0.25rem;
    }

    .settings-list {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }

    .settings-row:last-child {
      border-bottom: none;
    }

    .settings-row__label {
      color: var(--text-secondary);
    }

    .settings-row__value {
      color: var(--text-primary);
      font-weight: 500;
      text-align: right;
    }

    .settings-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0.9rem 1rem;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--green);
      cursor: pointer;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .settings-link:last-child {
      border-bottom: none;
    }

    .settings-link::after {
      content: '\2192';
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .tts-toggle {
      display: flex;
      gap: 0.25rem;
      background: var(--hanji-shadow);
      padding: 0.2rem;
      border-radius: var(--radius-sm);
    }

    .tts-toggle__btn {
      flex: 1;
      padding: 0.45rem 0.75rem;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.85rem;
      border-radius: 6px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .tts-toggle__btn.is-active {
      background: var(--bg);
      color: var(--text-primary);
      font-weight: 600;
      box-shadow: 0 1px 3px rgba(61, 43, 26, 0.1);
    }
  </style>
</head>
<body>
  <div class="app">
    <nav class="nav-bar">
      <a href="index.html" class="btn btn--ghost" data-back aria-label="Back">&#8592; Back</a>
      <h1 class="nav-bar__title">Settings</h1>
      <span style="width:4.5rem" aria-hidden="true"></span>
    </nav>

    <main class="app-main">
      <section class="settings-section" aria-labelledby="about-heading">
        <h2 id="about-heading" class="settings-section__title">About</h2>
        <div class="settings-list">
          <div class="settings-row">
            <span class="settings-row__label">App Version</span>
            <span class="settings-row__value">1.0.0</span>
          </div>
          <div class="settings-row">
            <span class="settings-row__label">Developer</span>
            <span class="settings-row__value">GGOOK's Studio</span>
          </div>
        </div>
      </section>

      <section class="settings-section" aria-labelledby="legal-heading">
        <h2 id="legal-heading" class="settings-section__title">Legal</h2>
        <div class="settings-list">
          <button type="button" class="settings-link" id="privacy-link">
            Privacy Policy
          </button>
        </div>
      </section>

      <section class="settings-section" aria-labelledby="sound-heading">
        <h2 id="sound-heading" class="settings-section__title">Sound</h2>
        <div class="settings-list">
          <div class="settings-row">
            <span class="settings-row__label">TTS Speed</span>
            <div class="tts-toggle" role="group" aria-label="TTS Speed">
              <button type="button" class="tts-toggle__btn is-active" data-tts-speed="normal">
                Normal
              </button>
              <button type="button" class="tts-toggle__btn" data-tts-speed="slow">
                Slow
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script>
    (function () {
      const STORAGE_KEY = 'ttsSpeed';
      const privacyUrl = 'https://kysystemstudio.com/privacy.html';
      const buttons = document.querySelectorAll('[data-tts-speed]');

      function applySpeed(speed) {
        localStorage.setItem(STORAGE_KEY, speed);
        buttons.forEach((btn) => {
          btn.classList.toggle('is-active', btn.dataset.ttsSpeed === speed);
        });
      }

      const saved = localStorage.getItem(STORAGE_KEY) || 'normal';
      applySpeed(saved === 'slow' ? 'slow' : 'normal');

      buttons.forEach((btn) => {
        btn.addEventListener('click', () => applySpeed(btn.dataset.ttsSpeed));
      });

      document.getElementById('privacy-link').addEventListener('click', (e) => {
        e.preventDefault();
        App.FlutterBridge.openExternalUrl(privacyUrl);
      });
    })();
  </script>
</body>
</html>
