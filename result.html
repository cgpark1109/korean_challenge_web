<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F5F0E8">
  <title>Learn Korean - Hangul</title>
  <link rel="stylesheet" href="css/base.css">
  <style>
    .result {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.25rem;
      background: var(--bg);
    }

    .result__stars {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 1rem;
      font-size: 2.5rem;
      line-height: 1;
    }

    .result__star {
      display: inline-block;
      opacity: 0;
      transform: scale(0.3);
    }

    .result__star.is-filled {
      color: var(--gold);
      animation: star-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .result__star.is-empty {
      color: var(--border);
      animation: star-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .result__star:nth-child(1) { animation-delay: 0.1s; }
    .result__star:nth-child(2) { animation-delay: 0.35s; }
    .result__star:nth-child(3) { animation-delay: 0.6s; }

    @keyframes star-pop {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .result__title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .result__stats {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .result__stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
    }

    .result__stat-label {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .result__stat-value {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .result__stat-value--score {
      color: var(--gold);
      font-size: 1.15rem;
    }

    .result__actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <div class="result">
    <div class="result__stars" id="stars" aria-label="Star rating"></div>
    <h1 class="result__title" id="title">Stage Clear! &#127881;</h1>

    <div class="result__stats">
      <div class="result__stat">
        <span class="result__stat-label">Score</span>
        <span class="result__stat-value result__stat-value--score" id="stat-score">0</span>
      </div>
      <div class="result__stat">
        <span class="result__stat-label">Correct</span>
        <span class="result__stat-value" id="stat-correct">0 / 10</span>
      </div>
      <div class="result__stat">
        <span class="result__stat-label">Best Streak</span>
        <span class="result__stat-value" id="stat-streak">0 in a row</span>
      </div>
    </div>

    <div class="result__actions">
      <button type="button" class="btn-primary" id="btn-map">Back to Home</button>
      <button type="button" class="btn-secondary" id="btn-retry">Try Again</button>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/hangul-data.js"></script>
  <script src="js/tts.js"></script>
  <script>
    (async function () {
      const TOTAL = 10;

      const stageId = Number(App.getParam('stage', '1'));
      const score = Number(App.getParam('score', '0'));
      const correct = Number(App.getParam('correct', '0'));
      const bestStreak = Number(App.getParam('streak', '0'));
      const cleared = correct >= 6;

      function starsFromCorrect(n) {
        if (n >= 8) return 3;
        if (n >= 6) return 2;
        return 1;
      }

      function renderStars(count) {
        const container = document.getElementById('stars');
        container.innerHTML = '';
        for (let i = 0; i < 3; i++) {
          const span = document.createElement('span');
          span.className = `result__star ${i < count ? 'is-filled' : 'is-empty'}`;
          span.textContent = i < count ? '\u2605' : '\u2606';
          span.setAttribute('aria-hidden', 'true');
          container.appendChild(span);
        }
        container.setAttribute('aria-label', `${count} out of 3 stars`);
      }

      function formatScore(n) {
        return n.toLocaleString('en-US');
      }

      const stars = starsFromCorrect(correct);

      renderStars(stars);
      document.getElementById('title').textContent = cleared
        ? 'Stage Clear! \uD83C\uDF89'
        : 'Game Over';
      document.getElementById('stat-score').textContent = formatScore(score);
      document.getElementById('stat-correct').textContent = `${correct} / ${TOTAL}`;
      document.getElementById('stat-streak').textContent = `${bestStreak} in a row`;

      await FlutterBridge.saveProgress(stageId, stars, score);

      document.getElementById('btn-map').addEventListener('click', () => {
        navigate('index.html');
      });

      document.getElementById('btn-retry').addEventListener('click', () => {
        navigate('index.html');
      });

      if (cleared && stars >= 2) {
        await TTS.init();
        TTS.speak('\uCD95\uD558\uD569\uB2C8\uB2E4');
      }
    })();
  </script>
</body>
</html>
