<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F5F0E8">
  <title>Learn Korean - Hangul</title>
  <link rel="stylesheet" href="css/base.css">
  <style>
    .home {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1.25rem 0;
      background: var(--bg);
    }

    .home__header {
      text-align: center;
      margin-bottom: 1.5rem;
      padding-top: 0.5rem;
    }

    .home__title {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.25;
    }

    .home__subtitle {
      margin-top: 0.4rem;
      font-size: 0.95rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .home__categories {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      margin-bottom: 1rem;
    }

    .home__card {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      height: 70px;
      padding: 0 1rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .home__card:hover {
      border-color: var(--gold);
      box-shadow: 0 2px 10px rgba(61, 43, 26, 0.08);
    }

    .home__card:active {
      transform: scale(0.995);
    }

    /* Tap hits the <a>, not inner spans (fixes missed taps in WebView) */
    .home__card > * {
      pointer-events: none;
    }

    .home__card-char {
      flex-shrink: 0;
      width: 2.5rem;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      line-height: 1;
    }

    .home__card-body {
      flex: 1;
      min-width: 0;
    }

    .home__card-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .home__card-count {
      flex-shrink: 0;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .home__footer {
      flex-shrink: 0;
      padding-bottom: 0.75rem;
    }

    .home__settings {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      width: 100%;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      transition: border-color 0.2s, color 0.2s;
    }

    .home__settings:hover {
      border-color: var(--gold);
      color: var(--text-primary);
    }

    .home__settings > * {
      pointer-events: none;
    }

    .home__banner-slot {
      height: 50px;
      width: 100%;
      background: var(--bg);
    }
  </style>
</head>
<body>
  <div class="home">
    <header class="home__header">
      <h1 class="home__title">Learn Korean - Hangul</h1>
      <p class="home__subtitle">Learn Hangul step by step</p>
    </header>

    <nav class="home__categories" id="category-list" aria-label="Choose a category"></nav>

    <footer class="home__footer">
      <a href="settings.html" class="home__settings category-card" id="settings-link" aria-label="Settings">
        <span aria-hidden="true">&#9881;</span>
        <span>Settings</span>
      </a>
      <div class="home__banner-slot" aria-hidden="true"></div>
    </footer>
  </div>

  <script src="js/app.js"></script>
  <script src="js/hangul-data.js"></script>
  <script>
    (function () {
      const BASIC_CONSONANT_COUNT = 14;

      const categories = [
        {
          page: 'consonants.html',
          char: '\u3131',
          name: '\uC790\uC74C Consonants',
          count: BASIC_CONSONANT_COUNT,
          unit: 'letters',
        },
        {
          page: 'double-consonants.html',
          char: '\u3132',
          name: '\uC30D\uC790\uC74C Double Consonants',
          count: HangulData.consonants.length - BASIC_CONSONANT_COUNT,
          unit: 'letters',
        },
        {
          page: 'vowels.html',
          char: '\u314F',
          name: '\uBAA8\uC74C Vowels',
          count: HangulData.vowels.length,
          unit: 'letters',
        },
        {
          page: 'free-study.html?tab=compound',
          char: '\u3150',
          name: '\uBCF5\uD569 \uBAA8\uC74C Compound Vowels',
          count: HangulData.compound_vowels.length,
          unit: 'letters',
        },
        {
          page: 'words.html',
          char: '\uC548\uB155',
          name: '\uAE30\uBCF8 \uB2E8\uC5B4 Basic Words',
          count: HangulData.words.length,
          unit: 'words',
        },
      ];

      const list = document.getElementById('category-list');
      App.bindCategoryList(list);

      categories.forEach((cat) => {
        const url = cat.page;
        const link = document.createElement('a');
        link.className = 'home__card category-card';
        link.href = url;
        App.bindInstantTap(link, url);

        const char = document.createElement('span');
        char.className = 'home__card-char';
        char.textContent = cat.char;

        const body = document.createElement('div');
        body.className = 'home__card-body';
        const name = document.createElement('p');
        name.className = 'home__card-name';
        name.textContent = cat.name;
        body.appendChild(name);

        const count = document.createElement('span');
        count.className = 'home__card-count';
        count.textContent = `${cat.count} ${cat.unit}`;

        link.appendChild(char);
        link.appendChild(body);
        link.appendChild(count);
        list.appendChild(link);
      });

      const settingsLink = document.getElementById('settings-link');
      App.bindInstantTap(settingsLink, 'settings.html');
    })();
  </script>
</body>
</html>
